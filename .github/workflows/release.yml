name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Publish npm package
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -e "console.log(JSON.parse(require('node:fs').readFileSync('packages/cli/package.json', 'utf8')).version)")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match packages/cli/package.json ($PACKAGE_VERSION)."
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Run packed launcher smoke test
        run: npm run test:pack

      - name: Prepare release notes
        id: release_notes
        shell: bash
        run: |
          RELEASE_NOTES_PATH=".github/release-notes/${GITHUB_REF_NAME}.md"

          if [ ! -f "$RELEASE_NOTES_PATH" ]; then
            echo "Missing release notes file: $RELEASE_NOTES_PATH"
            exit 1
          fi

          echo "path=$RELEASE_NOTES_PATH" >> "$GITHUB_OUTPUT"

      - name: Publish package
        run: npm publish -w agentic-insights --access public --provenance

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.release_notes.outputs.path }}
          generate_release_notes: true
