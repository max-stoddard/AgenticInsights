name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Publish npm package
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -e "console.log(JSON.parse(require('node:fs').readFileSync('packages/cli/package.json', 'utf8')).version)")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match packages/cli/package.json ($PACKAGE_VERSION)."
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Run packed launcher smoke test
        run: npm run test:pack

      - name: Publish package
        run: npm publish -w ai-water-usage --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
